<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="back-drop">
    <h2>Rock, Paper, Scissors Game</h2>
        <p><strong>Instructions:</strong> Click on "Rock", "Paper", or "Scissors" to play against the computer. The first player to reach 5 points wins! Click "Restart Game" to start a new game.</p>

    <div class="button-container">
        <button id="rock" aria-label="Play Rock">
            <i class="fa-solid fa-hand-back-fist"></i>
            Rock
        </button>
        <button id="paper" aria-label="Play Paper">
            <i class="fa-solid fa-hand"></i>
            Paper
        </button>
        <button id="scissors" aria-label="Play Scissors">
            <i class="fa-solid fa-hand-scissors"></i>
            Scissors
        </button>
    </div>
    <p id="round-results"></p>
    <div id="score-board">
        <div>Human: 0</div>
        <div>Computer: 0</div>
    </div>
    <button id="restart-button" style="display:none;">Restart Game</button>
</div>
    <script src="script.js"></script>
</body>
</html>
