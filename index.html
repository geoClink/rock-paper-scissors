<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="back-drop">
    <h2>Rock, Paper, Scissors Game</h2>
        <p><strong>Instructions:</strong> Click on "Rock", "Paper", or "Scissors" to play against the computer. The first player to reach 5 points wins! Click "Restart Game" to start a new game.</p>

    <div class="button-container">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </div>
    <p id="round-results"></p>
    <div id="score-board">
        <div>Human: 0</div>
        <div>Computer: 0</div>
    </div>
    <button id="restart-button" style="display:none;">Restart Game</button>
</div>
    <script src="script.js"></script>
</body>
</html>
